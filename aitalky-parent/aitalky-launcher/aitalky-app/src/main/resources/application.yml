# ⚠ 本地开发配置:连接信息/密钥均为明文,仅供本地;上线前改为环境变量/配置中心注入
server:
  port: 8080

spring:
  application:
    name: aitalky-app
  # 虚拟线程（Java 21）：高并发 IO 场景吞吐更好
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:mysql://localhost:3306/aitalky?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: root
    password: negan123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  # 数据库迁移:启动时按 db/migration 下 V{n}__xxx.sql 版本顺序执行
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
    mongodb:
      uri: mongodb://localhost:27017/aitalky
      # 启动时按实体 @CompoundIndex/@Indexed 声明幂等地确保索引存在(已存在跳过);
      # 不开则注解形同虚设(Spring Data 3.0+ 默认关闭),dev/正式环境都不会自动建索引。
      auto-index-creation: true
  # 文件上传大小限制(SpringBoot 自带 multipart;与 MinIO 单文件上限相互独立,取更严的一方)
  servlet:
    multipart:
      max-file-size: 25MB      # 单文件上限取最大类(视频/文档 20MB)+ 编码余量;分类细限在 MinioService
      max-request-size: 25MB
  # 邮件(验证码发送;复用 cicada SMTP,明文仅本地)
  mail:
    host: mail.devnew.top
    port: 587
    username: noreply@devnew.top
    password: x6FCrRjpGeh0Yvyp
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000

# RocketMQ（异步 + 顺序消息）
rocketmq:
  name-server: localhost:9876
  producer:
    group: aitalky-app-producer
    send-message-timeout: 3000

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # 枚举统一处理:实体可用 @EnumValue 枚举字段(数据规范:状态优先用语义化枚举)
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: input   # 用雪花ID手动注入，不用数据库自增

# 自定义
aitalky:
  jwt:
    secret: aitalky_dev_secret_key_please_change_in_prod_0123456789abcdef
    expire-hours: 12
    header: Authorization
    prefix: "Bearer "
  id:
    # ★ 横向扩展：每个实例必须不同(上线多实例时改这里)
    datacenter-id: 0
    worker-id: 0
  rsa:
    # 密码传输加密:前端公钥加密、后端私钥解密(复用 cicada 同款密钥;上线务必更换并用环境变量)
    public-key: 
    private-key: 
  invite:
    # 团队邀请落地页基址(邀请邮件链接 = 此值 + /#/join?token=xxx);上线改环境变量
    console-base-url: http://localhost:5173
  verify-code:
    master-enabled: true          # 开发期开启万能验证码;上线置 false
    master-code: "888888"         # 万能验证码:可直接用它注册/登录
    ttl-minutes: 5
    send-interval-seconds: 60
    code-length: 6
    from: noreply@devnew.top
    max-attempts: 5               # 连续输错上限,达到即临时锁定(防暴力枚举)
    lock-minutes: 10              # 触发锁定后的锁定时长(分钟)
  geoip:
    # IP 归属地解析(详情面板「所在地」);当前走 ip-api.com 免费接口(城市级,异步不阻塞接入)
    # 后续可换离线 MaxMind GeoLite2-City。注:免费版限速 45 次/分钟、仅 http、商用需付费;客户 IP 会外发第三方
    enabled: true
    provider: ipapi
    api-base-url: http://ip-api.com/json/
    lang: en                      # 统一存英文地名(国际通用,中英坐席都可读);改 zh-CN 则按中文风格拼接
    timeout-ms: 2000
    cache-days: 7
  translate:
    # 消息翻译引擎(可配可扩);当前复用 cicada 阿里云机翻网关,后续可加 claude 等 LLM
    enabled: true
    provider: ali-gateway
    ali-gateway-url: http://47.242.9.154:8080/api/translate/auto
    timeout-ms: 8000
  minio:
    # 对象存储(头像/图片消息);本地开发明文,上线改环境变量/配置中心
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: aitalky
    max-size: 10485760            # 单文件上限 10MB(字节)
  job:
    close-idle:
      cron: "0 * * * * ?"
  # 订阅计费支付渠道(本地明文,上线改环境变量/配置中心)
  billing:
    # 行级防篡改 HMAC 密钥(订单/余额/流水签名);与数据库分离存放,勿入库
    sign-key: "at9Qk3mVxP7aZ8sD2hJ6fK1nR4cL0bX9y"
    # 地址 AES-256-GCM 加密密钥(32字节 base64 或原文取32字节)
    address-key: "A7mK9xP2vL8sD4qW6eR1tY3uI5oP0zX8"
    channel: coinly                # 当前启用渠道
    coinly:
      base-url: "https://gateway.hhnumilala.xyz/api/"
      pid: "2067074671589957634"
      api-key: "ExDW1GnTccSWzCYOtMBS7TPZMwvF6dlw"
      # 回调地址(Coinly 收到充值后回调);本机开发用内网穿透/占位
      callback-url: "https://aitalky.example.top/api/public/billing/coinly/callback"

logging:
  level:
    com.aitalky: info
