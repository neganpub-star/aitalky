# ============================================================
# 公共配置(不区分环境)。环境相关项见 application-{dev,test,prod}.yml。
# 默认激活 dev(本地);测试/生产启动加 --spring.profiles.active=test|prod 覆盖。
# ============================================================
server:
  port: 8080

spring:
  application:
    name: aitalky-app
  profiles:
    active: dev
  # 虚拟线程（Java 21）：高并发 IO 场景吞吐更好
  threads:
    virtual:
      enabled: true
  # 数据库迁移:启动时按 db/migration 下 V{n}__xxx.sql 版本顺序执行
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # 已压缩基线:V1(全量表结构)+V2(平台种子)即为基线;旧库已重基线到 2,Flyway 对 ≤2 的迁移不执行/不校验
    baseline-version: 2
  data:
    mongodb:
      # 启动时按实体 @CompoundIndex/@Indexed 声明幂等地确保索引存在(已存在跳过)
      auto-index-creation: true
  # 文件上传大小限制(与 MinIO 单文件上限相互独立,取更严的一方)
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  # 邮件公共项(host/账号/密码按环境配)
  mail:
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000

# RocketMQ 生产者(name-server 按环境配)
rocketmq:
  producer:
    group: aitalky-app-producer
    send-message-timeout: 3000

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: input   # 用雪花ID手动注入，不用数据库自增

# 自定义(公共部分;密钥/连接/域名等环境相关项见 application-{env}.yml)
aitalky:
  jwt:
    expire-hours: 12
    header: Authorization
    prefix: "Bearer "
  verify-code:
    ttl-minutes: 5
    send-interval-seconds: 60
    code-length: 6
    max-attempts: 5               # 连续输错上限,达到即临时锁定(防暴力枚举)
    lock-minutes: 10              # 触发锁定后的锁定时长(分钟)
    max-per-email-per-day: 10     # 单邮箱每日发信上限(滚动24h),防对单邮箱长期轰炸;≤0 不限
    global-daily-limit: 5000      # 全局每日发信总量熔断(滚动24h),防 SMTP 配额被刷爆;≤0 不限
  rate-limit:
    # 取客户端 IP 是否信任 X-Forwarded-For。安全默认 false(用 remoteAddr,应用层不可伪造);
    # 仅当部署在「会用 $remote_addr 覆盖 XFF 的可信反代」之后时才置 true(见 prod 覆盖)
    trust-forward-headers: false
  geoip:
    # IP 归属地解析(详情面板「所在地」);走 ip-api.com 免费接口(各环境同一公网 API)
    enabled: true
    provider: ipapi
    api-base-url: http://ip-api.com/json/
    lang: en                      # 统一存英文地名(国际通用,中英坐席都可读)
    timeout-ms: 2000
    cache-days: 7
  translate:
    # 消息翻译引擎(网关地址按环境配)
    enabled: true
    provider: ali-gateway
    timeout-ms: 8000
  minio:
    # 对象存储(endpoint/密钥按环境配)
    bucket: aitalky
    max-size: 10485760            # 单文件上限 10MB(字节)
  job:
    close-idle:
      cron: "0 * * * * ?"
  billing:
    channel: coinly                # 当前启用渠道(密钥/pid/回调按环境配)

logging:
  level:
    com.aitalky: info
