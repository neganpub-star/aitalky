# 测试环境(profile=test)。激活:--spring.profiles.active=test。仅含环境相关项;公共见 application.yml。
spring:
  datasource:
    url: ${AITALKY_DB_URL:jdbc:mysql://localhost:3306/aitalky?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
    username: ${AITALKY_DB_USER:root}
    password: ${AITALKY_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${AITALKY_REDIS_HOST:localhost}
      port: ${AITALKY_REDIS_PORT:6379}
      database: ${AITALKY_REDIS_DB:0}
      password: ${AITALKY_REDIS_PASSWORD:}

aitalky:
  jwt:
    secret: ${AITALKY_JWT_SECRET:}
  id:
    datacenter-id: ${AITALKY_ADMIN_DC_ID:1}
    worker-id: ${AITALKY_ADMIN_WORKER_ID:0}
  rsa:
    public-key: ${AITALKY_RSA_PUBLIC_KEY:}
    private-key: ${AITALKY_RSA_PRIVATE_KEY:}
