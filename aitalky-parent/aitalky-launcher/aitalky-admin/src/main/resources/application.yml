# ============================================================
# 公共配置(不区分环境)。环境相关项见 application-{dev,test,prod}.yml。
# 默认激活 dev(本地);测试/生产加 --spring.profiles.active=test|prod 覆盖。
# ============================================================
server:
  port: 8090

spring:
  application:
    name: aitalky-admin
  profiles:
    active: dev
  threads:
    virtual:
      enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: input

aitalky:
  jwt:
    expire-hours: 12
    header: Authorization
    prefix: "Bearer "

logging:
  level:
    com.aitalky: info
