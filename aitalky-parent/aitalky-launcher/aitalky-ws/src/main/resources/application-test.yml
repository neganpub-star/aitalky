# 测试环境配置(profile=test)。激活:--spring.profiles.active=test
# 只覆盖环境相关项,其余继承 application.yml。优先级:环境变量 > ${VAR:默认}。
# 本地开发不要激活 test —— 不带 profile 即用 application.yml(本机配置)。
spring:
  data:
    redis:
      host: ${AITALKY_REDIS_HOST:localhost}
      port: ${AITALKY_REDIS_PORT:6379}
      database: ${AITALKY_REDIS_DB:0}
      password: ${AITALKY_REDIS_PASSWORD:}

rocketmq:
  name-server: ${AITALKY_ROCKETMQ_NAMESERVER:localhost:9876}

aitalky:
  jwt:
    secret: ${AITALKY_JWT_SECRET:}
  id:
    # ws 与 app/admin 必须用不同 datacenter-id(雪花ID防冲突)
    datacenter-id: ${AITALKY_WS_DC_ID:2}
    worker-id: ${AITALKY_WS_WORKER_ID:0}
  ws:
    # 多实例每个 ws 实例必须唯一
    instance-id: ${AITALKY_WS_INSTANCE_ID:ws-0}
