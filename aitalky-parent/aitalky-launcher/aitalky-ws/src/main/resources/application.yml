# ============================================================
# 公共配置(不区分环境)。环境相关项见 application-{dev,test,prod}.yml。
# 默认激活 dev(本地);测试/生产加 --spring.profiles.active=test|prod 覆盖。
# ws 入口不起 Tomcat(main 中设为 NONE);仍需 Redis 做连接路由。
# ============================================================
spring:
  application:
    name: aitalky-ws
  profiles:
    active: dev

rocketmq:
  producer:
    group: aitalky-ws-producer

aitalky:
  jwt:
    expire-hours: 12
  ws:
    port: 9100          # 避开 MinIO 占用的 9000
    path: /ws
    # 读空闲超时:设 180s 远大于前端心跳 25s——后台标签被浏览器节流(心跳被拖到 60s+)时
    # 仍不被误判掉线,后台坐席也能持续收实时帧(60s 节流心跳 < 180s 容忍)。
    reader-idle-seconds: 180

logging:
  level:
    com.aitalky: info
