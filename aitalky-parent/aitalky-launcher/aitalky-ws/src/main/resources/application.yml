# ⚠ 本地开发配置:连接信息/密钥均为明文,仅供本地;上线前改为环境变量/配置中心注入
spring:
  application:
    name: aitalky-ws
  # ws 入口不起 Tomcat（main 中设为 NONE）；仍需 Redis 做连接路由
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

rocketmq:
  name-server: localhost:9876
  producer:
    group: aitalky-ws-producer

aitalky:
  jwt:
    secret: aitalky_dev_secret_key_please_change_in_prod_0123456789abcdef
    expire-hours: 12
  id:
    datacenter-id: 2
    worker-id: 0
  ws:
    port: 9100          # 避开 MinIO 占用的 9000
    path: /ws
    # 读空闲超时:设 180s 远大于前端心跳 25s——后台标签被浏览器节流(心跳被拖到 60s+)时
    # 仍不被误判掉线,后台坐席也能持续收实时帧(60s 节流心跳 < 180s 容忍)。
    reader-idle-seconds: 180
    # ★ 横向扩展：每个 ws 实例必须唯一(上线多实例时改这里)
    instance-id: ws-0

logging:
  level:
    com.aitalky: info
